<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interview Result</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script defer src="/static/js/script.js"></script>
  <script defer src="/static/js/pages.js"></script>
</head>
<body data-theme="dark">

<div class="bg-orb"></div>
<div class="bg-orb orb-2"></div>

<img class="page-logo" id="theme-logo" src="/assets/img/brain_byte_darktheme.png" alt="Logo" />

<button class="side-button" type="button" aria-label="Open menu" aria-expanded="false" data-drawer-toggle>
  <div class="burger" aria-hidden="true"><span></span></div>
</button>

<div class="quick-actions" aria-label="Quick actions">
  <button class="fab-theme" type="button" data-theme-corner-toggle aria-label="Switch theme">
    <svg class="corner-theme-icon corner-theme-icon--sun" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/>
    </svg>
    <svg class="corner-theme-icon corner-theme-icon--moon" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <button class="fab-settings" type="button" id="settings-fab" aria-label="Settings">
    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M19.4 15a7.9 7.9 0 0 0 .1-6l-2 0.3a6.8 6.8 0 0 0-1.5-1.6l.6-1.9a8.2 8.2 0 0 0-6.1-.1l.6 1.9a6.8 6.8 0 0 0-1.5 1.6l-2-.3a7.9 7.9 0 0 0 .1 6l2-.3a6.8 6.8 0 0 0 1.5 1.6l-.6 1.9a8.2 8.2 0 0 0 6.1.1l-.6-1.9a6.8 6.8 0 0 0 1.5-1.6l2 .3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </svg>
  </button>

  <button class="fab-home" type="button" id="home-fab" aria-label="Home">
    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M4 10.5L12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
    </svg>
  </button>
</div>

<div class="drawer-overlay" data-drawer-overlay aria-hidden="true"></div>

<main class="page">
  <div class="shell">
    <div class="app-layout">

      <aside class="behind-nav" data-drawer aria-hidden="true">
        <div class="nav-top">
          <button class="nav-toggle" type="button" aria-label="Close menu" aria-expanded="false" data-drawer-toggle>
            <div class="burger" aria-hidden="true"><span></span></div>
          </button>
          <div class="nav-title">AI Mock Interview</div>
        </div>

        <nav class="sidebar-nav" aria-label="Navigation">
          <a class="amazon-nav-link" href="/">Dashboard</a>
          <a class="amazon-nav-link is-active" href="/result">Result</a>
          <a class="amazon-nav-link" href="/tips">Tips &amp; Tricks</a>
          <a class="amazon-nav-link" href="/settings">Settings</a>
        </nav>
      </aside>

      <div class="screen glass card" data-screen>
        <section class="stack main-panel">

          <div class="glass-card result-card">
            <h2>👤 <span id="res-name">-</span></h2>
            <p>⏱ Time Taken: <span id="res-time">0</span> seconds</p>
            <p>📌 Total Questions: <span id="res-total">0</span></p>
          </div>

          <div class="glass-card result-card">
            <h2 style="font-size: 2rem;">🏆 Score: <span style="font-size: 2.5rem;" id="res-score">0.0</span>/10</h2>
            <p class="feedback-content" style="margin-top: 6px; opacity: 0.95;" id="res-feedback">Loading feedback...</p>
            <div class="progress-bar" style="--progress: 0%;" id="res-progress">
              <div class="progress"></div>
            </div>
          </div>

          <div class="glass-card">
            <h3>📊 Question-wise Performance</h3>
            <ul id="res-perq" style="margin-top: 10px; list-style: none; padding: 0;"></ul>
          </div>

          <div class="glass-card">
            <h3>📈 Performance Insight</h3>
            <p style="margin-top: 6px;" id="res-attempts">Attempts: -</p>
            <div class="glass-card" style="margin-top: 10px; padding: 14px;">
              <canvas id="historyChart" height="180"></canvas>
            </div>
          </div>

          <div class="glass-card">
            <h3>🛠 Improvement Tips</h3>
            <ul id="res-tips"></ul>
          </div>

          <a class="link-reset" href="/">
            <button class="btn-3d" type="button">🔁 Take Interview Again</button>
          </a>

        </section>
      </div>

    </div>
  </div>
</main>

</body>
</html>
