<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Mock Interview</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script defer src="/static/js/script.js"></script>
  <script defer src="/static/js/pages.js"></script>
</head>
<body data-theme="dark">

<div class="bg-orb"></div>
<div class="bg-orb orb-2"></div>

<button class="side-button" type="button" aria-label="Open menu" aria-expanded="false" data-drawer-toggle>
  <div class="burger" aria-hidden="true"><span></span></div>
</button>

<div class="corner-theme">
  <button type="button" class="corner-theme-btn" data-theme-corner-toggle aria-label="Switch theme">
    <svg class="corner-theme-icon corner-theme-icon--sun" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/>
    </svg>
    <svg class="corner-theme-icon corner-theme-icon--moon" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</div>

<div class="drawer-overlay" data-drawer-overlay aria-hidden="true"></div>

<main class="page">
  <div class="shell">
    <div class="app-layout">

      <aside class="behind-nav" data-drawer aria-hidden="true">
        <div class="nav-top">
          <button class="nav-toggle" type="button" aria-label="Close menu" aria-expanded="false" data-drawer-toggle>
            <div class="burger" aria-hidden="true"><span></span></div>
          </button>
          <div class="nav-title">AI Mock Interview</div>
        </div>

        <nav class="sidebar-nav" aria-label="Navigation">
          <a class="amazon-nav-link is-active" href="/">Dashboard</a>
          <a class="amazon-nav-link" href="#settings">Settings</a>
        </nav>

        <details class="nav-panel" open>
          <summary class="nav-panel-summary">
            <span>Tips &amp; Tricks</span>
            <span class="accordion-hint"><span class="accordion-hint-label--collapsed">Expand</span><span class="accordion-hint-label--open">Collapse</span></span>
          </summary>
          <div class="nav-panel-body">
            <div class="glass-card">
              <p class="section-title" style="margin-bottom: 10px;">How to get the best score</p>
              <div class="accordion-body stack" style="gap: 10px; margin-top: 0;">
                <div class="pill">Structure: Context → Approach → Tradeoffs</div>
                <div class="pill">Use examples and edge cases</div>
                <div class="pill">Be concise, then expand if asked</div>
              </div>
            </div>
          </div>
        </details>

        <details class="nav-panel" id="settings" open>
          <summary class="nav-panel-summary">
            <span>Settings</span>
            <span class="accordion-hint"><span class="accordion-hint-label--collapsed">Expand</span><span class="accordion-hint-label--open">Collapse</span></span>
          </summary>
          <div class="nav-panel-body">
            <div class="glass-card settings">
              <div class="setting">
                <div class="meta">
                  <strong>Theme</strong>
                  <span>Toggle light / dark</span>
                </div>
                <label class="toggle" aria-label="Theme toggle">
                  <input type="checkbox" data-theme-switch />
                  <span class="toggle-track" aria-hidden="true"></span>
                  <span class="toggle-thumb" aria-hidden="true"></span>
                </label>
              </div>
            </div>
          </div>
        </details>
      </aside>

      <div class="screen glass card" data-screen>
        <section class="stack main-panel">
          <div class="glass-card">
            <form class="form" id="start-form">

              <div class="field">
                <label>Name</label>
                <input type="text" name="name" placeholder="Your name" required />
              </div>

              <div class="field">
                <label>Role</label>
                <select id="role" name="role" required>
                  <option value="">Select Role</option>
                </select>
              </div>

              <div class="field">
                <label>Field</label>
                <select id="field" name="field" required></select>
              </div>

              <div class="field">
                <label>Difficulty</label>
                <select name="difficulty" required>
                  <option value="easy">Easy</option>
                  <option value="medium" selected>Medium</option>
                  <option value="hard">Hard</option>
                </select>
              </div>

              <div class="field">
                <label>Number of Questions</label>
                <input type="number" name="num_questions" value="5" min="1" max="20" required />
              </div>

              <button class="btn-3d" type="submit">Start Interview</button>
            </form>
          </div>
        </section>
      </div>

    </div>
  </div>
</main>

</body>
</html>
